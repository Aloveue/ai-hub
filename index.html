<html lang="zh-CN">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hub - 大模型导航</title>
<style>
  :root {
    --bg: #060912;
    --bg-card: rgba(18, 24, 48, 0.7);
    --bg-hover: rgba(26, 34, 68, 0.85);
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --accent3: #06b6d4;
    --accent4: #ec4899;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: rgba(255,255,255,0.06);
    --shadow: 0 8px 40px rgba(0,0,0,0.5);
    --radius: 18px;
    --glow: 0 0 30px rgba(99,102,241,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== Animated Background ===== */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -2;
    background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(99,102,241,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(236,72,153,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 20% 70%, rgba(6,182,212,0.05) 0%, transparent 60%);
  }

  /* Grid dots overlay */
  .bg-dots {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: linear-gradient(transparent 0%, rgba(0,0,0,0.4) 20%, rgba(0,0,0,0.4) 80%, transparent 100%);
    -webkit-mask-image: linear-gradient(transparent 0%, rgba(0,0,0,0.4) 20%, rgba(0,0,0,0.4) 80%, transparent 100%);
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 100px 20px 50px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -300px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, rgba(139,92,246,0.08) 40%, transparent 70%);
    pointer-events: none;
    animation: heroPulse 6s ease-in-out infinite;
  }
  @keyframes heroPulse {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
    50% { transform: translateX(-50%) scale(1.15); opacity: 1; }
  }
  .hero .badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    color: #a5b4fc;
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.2);
    margin-bottom: 24px;
    letter-spacing: 0.5px;
    backdrop-filter: blur(10px);
  }
  .hero h1 {
    font-size: 56px;
    font-weight: 900;
    background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 30%, #8b5cf6 60%, #ec4899 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
    letter-spacing: -2px;
    line-height: 1.1;
  }
  .hero p {
    color: var(--text-muted);
    font-size: 19px;
    max-width: 580px;
    margin: 0 auto 36px;
    line-height: 1.7;
  }

  /* Search */
  .search-wrap {
    max-width: 580px;
    margin: 0 auto 44px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 18px 24px 18px 56px;
    border-radius: 60px;
    border: 1.5px solid rgba(255,255,255,0.08);
    background: rgba(18, 24, 48, 0.6);
    backdrop-filter: blur(20px);
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(99,102,241,0.12), 0 0 40px rgba(99,102,241,0.08);
    background: rgba(18, 24, 48, 0.85);
  }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap svg {
    position: absolute;
    left: 22px; top: 50%;
    transform: translateY(-50%);
    width: 20px; height: 20px;
    color: var(--text-muted);
    pointer-events: none;
    transition: color 0.3s;
  }
  .search-wrap input:focus ~ svg { color: var(--accent); }

  /* Filter tags */
  .filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 0 20px 56px;
    max-width: 900px;
    margin: 0 auto;
  }
  .filter-btn {
    padding: 10px 22px;
    border-radius: 50px;
    border: 1.5px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(10px);
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    font-family: inherit;
    font-weight: 500;
  }
  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(99,102,241,0.08);
    box-shadow: 0 0 20px rgba(99,102,241,0.1);
  }
  .filter-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    transform: translateY(-1px);
  }

  /* Cards grid */
  .container {
    max-width: 1260px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }
  .container::before {
    content: '';
    display: block;
    width: 80px; height: 4px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent4));
    margin: 0 auto 48px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 22px;
  }

  .card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 28px;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, rgba(99,102,241,0.06), rgba(236,72,153,0.04));
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .card:hover::after { opacity: 1; }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(99,102,241,0.15);
    border-color: rgba(99,102,241,0.2);
  }
  .card.hidden { display: none; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 18px;
  }
  .card-icon {
    width: 52px; height: 52px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 800;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .card-icon::after {
    content: '';
    position: absolute;
    inset: -2px; border-radius: 17px;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: -1;
  }
  .card:hover .card-icon::after {
    opacity: 1;
    background: var(--glow);
  }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-title {
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .card-tag {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    opacity: 0.85;
    letter-spacing: 0.3px;
  }
  .card-desc {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.65;
    margin-bottom: 16px;
  }
  .card-features {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .feature-tag {
    padding: 5px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    color: var(--text-muted);
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.3s;
  }
  .card:hover .feature-tag {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.1);
  }
  .card-arrow {
    position: absolute;
    top: 28px; right: 22px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateX(8px);
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .card:hover .card-arrow {
    opacity: 1;
    transform: translateX(0);
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 4px 16px rgba(99,102,241,0.3);
  }
  .card-arrow svg { width: 14px; height: 14px; color: #fff; }

  /* Footer */
  footer {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-size: 13px;
    border-top: 1px solid rgba(255,255,255,0.05);
    letter-spacing: 0.3px;
  }

  /* Mobile */
  @media (max-width: 640px) {
    .hero h1 { font-size: 36px; }
    .hero { padding: 60px 16px 30px; }
    .hero p { font-size: 16px; }
    .grid { grid-template-columns: 1fr; }
    .glossary-grid { grid-template-columns: 1fr !important; }
  }

  /* ===== Glossary ===== */
  .glossary-section {
    max-width: 1260px;
    margin: 0 auto;
    padding: 20px 20px 80px;
  }
  .glossary-section::before {
    content: '';
    display: block;
    width: 80px; height: 4px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    margin: 0 auto 48px;
  }
  .glossary-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .glossary-header h2 {
    font-size: 36px;
    font-weight: 900;
    background: linear-gradient(135deg, #06b6d4, #6366f1, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    letter-spacing: -1px;
  }
  .glossary-header p {
    color: var(--text-muted);
    font-size: 17px;
  }
  .glossary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
  }
  .glossary-card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 28px;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .glossary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent3), var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.4s;
  }
  .glossary-card:hover {
    background: var(--bg-hover);
    border-color: rgba(6,182,212,0.2);
    transform: translateY(-3px);
    box-shadow: 0 12px 36px rgba(0,0,0,0.4);
  }
  .glossary-card:hover::before { opacity: 1; }
  .glossary-card .term-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.3px;
  }
  .glossary-card .term-name::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    flex-shrink: 0;
  }
  .glossary-card:hover .term-name::before {
    box-shadow: 0 0 12px var(--accent3);
  }
  .glossary-card .term-en {
    font-size: 12px;
    color: var(--accent3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-left: 18px;
  }
  .glossary-card .term-meaning {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 14px;
  }
  .glossary-card .term-usage {
    background: rgba(6,182,212,0.06);
    border-left: 3px solid var(--accent3);
    padding: 12px 16px;
    border-radius: 0 10px 10px 0;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    transition: all 0.3s;
  }
  .glossary-card:hover .term-usage {
    background: rgba(6,182,212,0.1);
    border-left-color: var(--accent);
  }
  .glossary-card .term-usage-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>

const grid = document.getElementById('cardGrid');
const searchInput = document.getElementById('searchInput');
const filterBtns = document.querySelectorAll('.filter-btn');
let currentFilter = 'all';

function renderCards(items) {
  grid.innerHTML = '';
  items.forEach(m => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = m.url;
    card.target = '_blank';
    card.rel = 'noopener';
    card.innerHTML = `
      <div class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>
      </div>
      <div class="card-header">
        <div class="card-icon" style="background:${m.color}20;color:${m.color};border:1px solid ${m.color}40">${m.icon}</div>
        <div class="card-title-wrap">
          <div class="card-title">${m.name}</div>
          <span class="card-tag" style="background:${m.color}">${m.company}</span>
        </div>
      </div>
      <div class="card-desc">${m.desc}</div>
      <div class="card-features">
        ${m.features.map(f => `<span class="feature-tag">${f}</span>`).join('')}
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterCards() {
  const query = searchInput.value.toLowerCase().trim();
  const filtered = models.filter(m => {
    const matchesFilter = currentFilter === 'all' || m.category.includes(currentFilter);
    const matchesSearch = !query ||
      m.name.toLowerCase().includes(query) ||
      m.company.toLowerCase().includes(query) ||
      m.desc.toLowerCase().includes(query) ||
      m.features.some(f => f.toLowerCase().includes(query));
    return matchesFilter && matchesSearch;
  });
  renderCards(filtered);
}

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    filterCards();
  });
});

searchInput.addEventListener('input', filterCards);

renderCards(models);
